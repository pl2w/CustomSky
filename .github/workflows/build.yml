name: Auto Build

on:
  schedule:
    - cron: '0 19 * * 5'
  workflow_dispatch:
  push:

jobs:
  auto-build:
    name: Auto Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - name: Cache NuGet Packages
        uses: actions/cache@v6
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Add Custom NuGet Source
        run: dotnet nuget add source https://git.crafterbot.com/api/packages/GorillaTagModding/nuget/index.json

      - name: Restore Dependencies
        run: dotnet restore

      - name: Build Project
        run: dotnet build -c Release --no-restore -p:UseSharedCompilation=false

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: CustomSky
          path: |
            CustomSky/bin/Release/netstandard2.1/CustomSky.dll
            CustomSky/bin/Release/netstandard2.1/CustomSky.pdb
          if-no-files-found: error
